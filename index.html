<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>La Fabrique Chocolatée - Lancement Nouveau Produit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --choco-dark: #3b2314;
      --choco-light: #f5e2c8;
      --accent: #c27b48;
      --accent-dark: #9b5c2f;
      --danger: #c0392b;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #fdf3e4 0, #f3e0c8 40%, #e4c7a1 100%);
      color: var(--choco-dark);
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--choco-dark);
    }

    .logo span {
      color: var(--accent);
    }

    .header-cta {
      font-size: 0.9rem;
      color: var(--choco-dark);
    }

    .header-cta strong {
      color: var(--danger);
    }

    main {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      padding: 40px;
      gap: 40px;
      align-items: center;
      justify-content: center;
    }

    .hero-text {
      flex: 1 1 320px;
      max-width: 540px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(59, 35, 20, 0.08);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .badge span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.25);
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 12px;
    }

    h1 span {
      color: var(--accent-dark);
    }

    .subtitle {
      font-size: 1.05rem;
      margin-bottom: 20px;
      max-width: 460px;
    }

    .highlight {
      background: rgba(255, 255, 255, 0.7);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 24px 0;
    }

    .benefit {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 0.95rem;
    }

    .benefit-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .urgency-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .urgency-meter {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: rgba(192, 57, 43, 0.15);
      overflow: hidden;
      position: relative;
    }

    .urgency-meter-fill {
      position: absolute;
      inset: 0;
      width: 78%;
      background: linear-gradient(90deg, #f39c12, #e67e22, #c0392b);
    }

    .urgency-text {
      color: var(--danger);
      font-weight: 600;
    }

    .form-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      padding: 22px 22px 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      flex: 1 1 280px;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0 0, rgba(194, 123, 72, 0.18) 0, transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(59, 35, 20, 0.18) 0, transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .form-inner {
      position: relative;
      z-index: 1;
    }

    .form-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .form-subtitle {
      font-size: 0.9rem;
      color: #5b4634;
      margin-bottom: 16px;
    }

    .stock-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(192, 57, 43, 0.08);
      color: var(--danger);
      font-size: 0.8rem;
      margin-bottom: 14px;
    }

    .stock-pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--danger);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 2px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 10px 11px;
      border-radius: 8px;
      border: 1px solid rgba(59, 35, 20, 0.25);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: rgba(255, 255, 255, 0.9);
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(194, 123, 72, 0.25);
    }

    .inline-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .inline-fields > div {
      flex: 1 1 120px;
    }

    button[type="submit"] {
      margin-top: 6px;
      padding: 11px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--white);
